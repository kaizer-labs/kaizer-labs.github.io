    <script>
      (function restoreSpaPath(location) {
        if (location.search[1] !== "/") return;

        const decoded = location.search
          .slice(1)
          .split("&")
          .map(function replaceAnd(value) {
            return value.replace(/~and~/g, "&");
          })
          .join("?");

        window.history.replaceState(
          null,
          "",
          location.pathname.slice(0, -1) + decoded + location.hash,
        );
      })(window.location);

      (function applyStoredTheme() {
        const storedTheme = localStorage.getItem("theme-preference");
        const theme = storedTheme || "light";
        document.documentElement.dataset.theme = theme;
        const themeColor = theme === "dark" ? "#08111f" : "#f6f3ec";
        document
          .querySelector('meta[name="theme-color"]')
          ?.setAttribute("content", themeColor);
      })();
    </script>
