  <text x="128" y="520" fill="#14b8a6" font-size="88" font-family="Arial, sans-serif" font-weight="700">~30s → &lt;1s</text>
  <text x="128" y="575" fill="#d9fffb" font-size="24" font-family="Arial, sans-serif" letter-spacing="4">HOT PATH OPTIMIZATION / CORRECTNESS / API PERFORMANCE</text>
